<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Anirban's Portfolio website</title>
    <link rel="icon" type="image/png" href="Images/logo.png">
    <link rel="stylesheet" href="projects.css">
</head>
<body>
    
    <header>
        <label class="logo">Projects</label>

    <!-- Menu icon -->
    <div class="menu-btn">
        <i class="fa-solid fa-bars"></i>
    </div>
        <nav id="nav-menu">
            <a href="index.html" class="Home">Home</a>
            <a href="skills.html">Sklls</a>
            <a href="projects.html">Projects</a>
            <a href="about.html">About_Me</a>
        </nav>
    </header>
    <selection class="skill-section">
          <h1 class="project-title">My Skills</h1>
          
          <div class="project-container">
            <marquee> <h1>i currently don't have any projects to showcase. but i'm making some and i will update it soon.</h1></marquee>

          </div>
    </selection>
    <!-- only javascript logic using AI -->
    <script>
    const menuBtn = document.querySelector(".menu-btn");
    const nav = document.getElementById("nav-menu");
    menuBtn.addEventListener("click", () => {
        nav.classList.toggle("active");
    });
    document.addEventListener("click", (e) => {
        if (!nav.contains(e.target) && !menuBtn.contains(e.target)) {
            nav.classList.remove("active");
        }
    });
    </script>
    
</body>
</html>
